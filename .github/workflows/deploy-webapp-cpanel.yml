
name: Deploy WebApp to cPanel

on:
  push:
    branches: [main]
    paths:
      - 'apps/web-app/**'
      - 'libs/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-webapp
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app (production)
        run: npx nx build web-app --configuration=production

      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.CPANEL_FTP_HOST }}
          username: ${{ secrets.CPANEL_FTP_USER }}
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          local-dir: ./dist/apps/web-app/browser/
          server-dir: ${{ secrets.CPANEL_FTP_REMOTE_DIR }}
          dangerous-clean-slate: true
          exclude: |
            .well-known/**
            .htaccess/**
